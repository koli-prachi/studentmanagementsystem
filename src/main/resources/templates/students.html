<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>
<body>


<nav class="navbar navbar-inverse">
    <div class="container-fluid">
        <!-- Brand -->
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#collapsibleNavbar">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="#">Student Management System</a>
        </div>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="nav navbar-nav">
                <li><a href="#" th:href="@{/students}">Student Management</a></li>
            </ul>
        </div>
    </div>
</nav>




        <div class="container">
            <div class="row">
                <h1> List Students </h1>
            </div>

            <br>
            <div class="row">
                <div class="col-lg-3">
                    <a th:href = "@{/students/new}" class="btn btn-primary btn-sm mb-3"> Add Student </a>
                </div>

            </div>
            <br>


            <table class=" table table-hover table-striped table-bordered">
                <thead style="background-color: #222; color: white;">
                    <tr>
                        <th> Student First Name </th>
                        <th> Student Last Name </th>
                        <th> Student Email</th>
                        <th> Actions </th>
                    </tr>
                </thead>

                <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.firstName}"></td>
                    <td th:text="${student.lastName}"></td>
                    <td th:text="${student.email}"></td>
                    <td>
                        <a th:href="@{/students/edit/{id}(id=${student.id})}"
                           class="btn btn-primary">Update</a>

                        <a th:href="@{/students/{id}(id=${student.id})}"
                           class="btn btn-danger">Delete</a>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>

</body>
</html>
